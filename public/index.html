```html
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一人用チャットアプリ</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    .chat {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 10px;
      margin: 0;
    }

    .messages li {
      margin-bottom: 10px;
    }

    .form {
      display: flex;
      border-top: 1px solid #ccc;
    }

    .input {
      flex: 1;
      padding: 10px;
      border: none;
      font-size: 16px;
    }

    .submit {
      padding: 10px 20px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="chat">
    <ul class="messages"></ul>

    <form class="form">
      <input class="input" autocomplete="off" placeholder="メッセージを入力">
      <button class="submit">送信</button>
    </form>
  </div>

  <script>
    const host = location.origin.replace(/^http/, 'ws')
    const ws = new WebSocket(host + '/ws')

    const myId = crypto.randomUUID().substring(0, 8)

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data)

      if (msg.type === 'chat') {
        const messageList = document.querySelector('.messages')
        const li = document.createElement('li')

        if (msg.id === myId) {
          li.textContent = `🙋 自分 : ${msg.text}`
        } else if (msg.id === 'BOT') {
          li.textContent = `🤖 BOT : ${msg.text}`
        } else {
          li.textContent = `${msg.id} : ${msg.text}`
        }

        messageList.appendChild(li)

        messageList.scrollTop = messageList.scrollHeight
      }
    }

    const form = document.querySelector('.form')

    form.onsubmit = (e) => {
      e.preventDefault()

      const input = document.querySelector('.input')

      const text = input.value

      if (text === '') {
        return
      }

      ws.send(
        JSON.stringify({
          id: myId,
          text: text,
          type: 'chat'
        })
      )

      input.value = ''
      input.focus()
    }

    ws.onerror = (error) => {
      console.error(error)
    }
  </script>
</body>
</html>
```
